name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when new commits land.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (linux x86_64)
    # Match the release runner (glibc 2.35) so CI catches what would break a release.
    runs-on: ubuntu-22.04
    env:
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # build.rs fetches libFunction-linux-x86_64.so from cdn.fxn.ai and links it.
      - name: Build
        run: cargo build --locked --target "$TARGET"

      - name: Test
        run: cargo test --locked --target "$TARGET"
