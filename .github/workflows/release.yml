name: Build Muna Server (Release)

on:
  release:
    types: [published]

permissions:
  contents: write # required to upload assets to the release

jobs:
  linux-x86_64:
    name: Build linux x86_64 binary
    runs-on: ubuntu-22.04
    env:
      TARGET: x86_64-unknown-linux-gnu
      ASSET: muna-server-x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target "$TARGET"

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp "target/$TARGET/release/muna-server" "dist/$ASSET"
          chmod +x "dist/$ASSET"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/$ASSET" --clobber
